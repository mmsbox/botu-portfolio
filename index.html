<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/destyle.css@3.0.2/destyle.css" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="robots" content="noindex, nofollow" />
		<meta name="description" content="Momoka's Portfolio" />
		<link
			href="https://fonts.googleapis.com/css2?family=Chango&family=Jersey+10&family=M+PLUS+Rounded+1c:wght@400;500;700;800;900&family=Noto+Sans+JP:wght@100..900&display=swap"
			rel="stylesheet"
		/>
		<link href="https://fonts.googleapis.com/css2?family=Baloo+2&display=swap" rel="stylesheet" />

		<title>Momoka's Portfolio</title>
		<link rel="stylesheet" href="./styles/main.css" />
		<link rel="stylesheet" href="./styles/animations.css" />
	</head>
	<body>
		<!-- クマちゃんのトップボタン -->
		<button class="top-button">
			<img src="./assets/images/top_bear-btn.webp" alt="Top Button" />
			<div class="bubble">Top!</div>
		</button>

		<header class="header">
			<h1 class="header__logo"><a href="index.html">Momoka’s Portfolio</a></h1>
			<nav class="header__nav">
				<ul class="header__menu">
					<li class="header__item">
						<a href="./pages/works.html"><span class="emoji">🖼️</span> WORK</a>
					</li>
					<li class="header__item">
						<a href="./pages/about.html"><span class="emoji">🌈</span> ABOUT</a>
					</li>
					<li class="header__item">
						<a href="index.html#contact"><span class="emoji">✉️</span> CONTACT</a>
					</li>
				</ul>
			</nav>
		</header>

		<main>
			<section id="home">
				<img src="./assets/images/top-img.png" alt="トップ画像" />
			</section>

			<section class="about">
				<div class="left-content">
					<p class="intro-text">Hello!<br />I’m Momoka:)</p>
					<div class="ticket">
						<img src="./assets/images/ticket.png" alt="Ticket" class="ticket-image" />
					</div>
				</div>

				<div class="right-content">
					<div class="avatar">
						<img src="assets/icons/avatar.png" class="avatar-static" alt="Momoka" />
						<img src="assets/icons/avatar.gif" class="avatar-gif" alt="Momoka" />
					</div>
					<button class="view-more"><a href="./pages/about.html">View More!</a></button>
				</div>
			</section>

			<section id="work">
				<h2>WORK</h2>
				<div id="works-gallery" class="works-gallery">
					<!-- JSで動的に作品を追加 -->
				</div>
				<a href="./pages/works.html" class="view-all">View All</a>
			</section>

			<section id="contact" class="contact-section">
				<div class="contact-box">
					<h2 class="contact-heading">📮 CONTACT</h2>
					<p class="contact-text">お問い合わせは下記フォームよりお願いいたします。</p>
					<a
						href="https://docs.google.com/forms/d/e/1FAIpQLSeMNLVYrlVkldwy67cwyTmFdrShArn8p9hg4f5oZxNMJUTB_Q/viewform?embedded=true"
						class="contact-btn"
						target="_blank"
						rel="noopener noreferrer"
					>
						お問い合わせフォームを開く <span>📬</span>
					</a>
				</div>
			</section>
		</main>

		<div class="drawing-container">
			<text class="message-text">✿ THANK YOU FOR VISITING! ✿</text>
			<img src="./assets/images/footer-girl.webp" alt="Brush" class="brush" />
		</div>

		<footer>
			<nav>
				<ul>
					<li><a href="./pages/works.html">WORK</a></li>
					<li><a href="./pages/about.html">ABOUT</a></li>
					<li><a href="#contact">CONTACT</a></li>
				</ul>
			</nav>
			<p>&copy; 2024 Momoka Abe. All rights reserved.</p>
		</footer>
		<script src="./scripts/main.js"></script>
		<script src="./scripts/animations.js"></script>
	</body>
</html>
